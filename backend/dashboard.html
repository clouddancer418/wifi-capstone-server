<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>캠퍼스 WiFi 대시보드</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      background: #f5f5f5;
      padding: 20px;
      margin: 0;
    }

    h1 {
      margin-bottom: 20px;
    }

    .stats-banner {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .stat-label {
      font-size: 13px;
      color: #666;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 30px;
      font-weight: bold;
      color: #1e2761;
    }

    .stat-unit {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .alert-value {
      color: #e74c3c;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      border-top: 4px solid #ddd;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.12);
    }

    .card.good-border {
      border-top-color: #2ecc71;
    }

    .card.normal-border {
      border-top-color: #f39c12;
    }

    .card.bad-border {
      border-top-color: #e74c3c;
    }

    .score {
      font-size: 32px;
      font-weight: bold;
      margin: 10px 0;
    }

    .good { color: green; }
    .normal { color: orange; }
    .bad { color: red; }

    .bottom-layout {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 16px;
      margin-top: 12px;
    }

    .chart-box,
    .alert-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      min-height: 420px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    select {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    .alert-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      border-left: 4px solid #e74c3c;
      background: #fff5f5;
    }

    .alert-item.medium {
      border-left-color: #f39c12;
      background: #fffaf0;
    }

    .alert-building {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .alert-message {
      font-size: 14px;
      color: #444;
      margin-bottom: 4px;
    }

    .alert-time {
      font-size: 12px;
      color: #888;
    }

    .no-alert {
      color: #888;
      text-align: center;
      padding: 30px 0;
    }

    #errorBox {
      margin-top: 12px;
      color: red;
      font-size: 14px;
      white-space: pre-wrap;
    }

    @media (max-width: 1100px) {
      .stats-banner {
        grid-template-columns: repeat(2, 1fr);
      }

      .bottom-layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 600px) {
      .stats-banner {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>캠퍼스 WiFi 모니터링 대시보드</h1>

  <div class="stats-banner">
    <div class="stat-card">
      <div class="stat-label">총 수집 데이터</div>
      <div class="stat-value" id="totalCount">--</div>
      <div class="stat-unit">건</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">활성 건물</div>
      <div class="stat-value" id="activeBuildings">--</div>
      <div class="stat-unit">개</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">캠퍼스 평균 품질</div>
      <div class="stat-value" id="avgScore">--</div>
      <div class="stat-unit">점</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">미확인 알림</div>
      <div class="stat-value alert-value" id="alertCount">--</div>
      <div class="stat-unit">건</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="bottom-layout">
    <div class="chart-box">
      <div class="section-header">
        <h2 style="margin:0;">📈 시간대별 WiFi 품질</h2>
        <select id="buildingSelect">
          <option value="공학관">공학관</option>
          <option value="도서관">도서관</option>
          <option value="본관">본관</option>
          <option value="학생회관">학생회관</option>
        </select>
      </div>

      <canvas id="hourlyChart" height="120"></canvas>
      <div id="errorBox"></div>
    </div>

    <div class="alert-box">
      <div class="section-header">
        <h2 style="margin:0;">⚠️ 이상 탐지 알림</h2>
      </div>
      <div id="alertList">
        <div class="no-alert">로딩 중...</div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://wifi-capstone-server.onrender.com";
    let chartInstance = null;

    function setError(msg) {
      document.getElementById("errorBox").textContent = msg || "";
    }

    async function loadBuildings() {
      try {
        setError("");
        const res = await fetch(`${API_BASE}/dashboard/buildings`);
        const data = await res.json();

        const grid = document.getElementById("grid");
        grid.innerHTML = "";
      

        if (!Array.isArray(data) || data.length === 0) {
          grid.innerHTML = "<p>표시할 데이터가 없습니다.</p>";
          document.getElementById("totalCount").textContent = "0";
          document.getElementById("activeBuildings").textContent = "0";
          document.getElementById("avgScore").textContent = "0";
          return;
        }

        const totalCount = data.reduce((sum, item) => sum + Number(item.measurement_count || 0), 0);
        const activeBuildings = data.length;
        const avgScore = Math.round(
          data.reduce((sum, item) => sum + Number(item.avg_score || 0), 0) / data.length
        );

        document.getElementById("totalCount").textContent = totalCount;
        document.getElementById("activeBuildings").textContent = activeBuildings;
        document.getElementById("avgScore").textContent = avgScore;

        data.forEach(item => {
          let colorClass = "normal";
          let borderClass = "normal-border";

          if (item.status === "좋음") {
            colorClass = "good";
            borderClass = "good-border";
          }
          if (item.status === "나쁨") {
            colorClass = "bad";
            borderClass = "bad-border";
          }

          const card = document.createElement("div");
          card.className = `card ${borderClass}`;

          card.innerHTML = `
            <h3>${item.building}</h3>
            <div class="score ${colorClass}">${item.avg_score}점</div>
            <p>상태: ${item.status}</p>
            <p>측정 수: ${item.measurement_count}</p>
          `;

          card.addEventListener("click", () => {
            document.getElementById("buildingSelect").value = item.building;
            loadHourlyChart(item.building);
          });

          grid.appendChild(card);
        });
      } catch (e) {
        setError("건물 데이터 로드 실패: " + e.message);
      }
    }

    async function loadHourlyChart(building) {
      try {
        setError("");
        const res = await fetch(`${API_BASE}/dashboard/hourly?building=${encodeURIComponent(building)}`);
        const data = await res.json();

        const hours = Array.from({ length: 24 }, (_, i) => i);
        const scores = hours.map(h => {
          const found = data.find(d => Number(d.hour) === h);
          return found ? Number(found.avg_score) : 0;
        });

        const colors = scores.map(score => {
          if (score >= 80) return "rgba(46, 204, 113, 0.8)";
          if (score >= 50) return "rgba(243, 156, 18, 0.8)";
          return "rgba(231, 76, 60, 0.8)";
        });

        const ctx = document.getElementById("hourlyChart").getContext("2d");

        if (chartInstance) {
          chartInstance.destroy();
        }

        chartInstance = new Chart(ctx, {
          type: "bar",
          data: {
            labels: hours.map(h => `${h}시`),
            datasets: [{
              label: `${building} 시간대별 평균 품질`,
              data: scores,
              backgroundColor: colors,
              borderRadius: 4
            }]
          },
          options: {
            responsive: true,
            plugins: {
              legend: {
                display: false
              }
            },
            scales: {
              y: {
                min: 0,
                max: 100,
                title: {
                  display: true,
                  text: "품질 점수"
                }
              }
            }
          }
        });
      } catch (e) {
        console.error("시간대별 차트 로드 실패:", e);
        setError("시간대별 차트 로드 실패: " + e.message);
      }
    }

    async function loadAlerts() {
      try {
        const res = await fetch(`${API_BASE}/dashboard/alerts`);
        const data = await res.json();

        const alertList = document.getElementById("alertList");
        document.getElementById("alertCount").textContent = Array.isArray(data) ? data.length : 0;

        if (!Array.isArray(data) || data.length === 0) {
          alertList.innerHTML = '<div class="no-alert">현재 알림 없음 ✅</div>';
          return;
        }

        alertList.innerHTML = data.map(alert => `
          <div class="alert-item ${alert.severity === 'high' ? '' : 'medium'}">
            <div class="alert-building">
              ${alert.severity === 'high' ? '🔴' : '🟡'} ${alert.building || '전체'}
            </div>
            <div class="alert-message">${alert.message}</div>
            <div class="alert-time">${new Date(alert.created_at).toLocaleString('ko-KR')}</div>
          </div>
        `).join("");
      } catch (e) {
        document.getElementById("alertList").innerHTML =
          '<div class="no-alert">알림 로드 실패</div>';
        document.getElementById("alertCount").textContent = "0";
      }
    }

    async function loadAll() {
      await loadBuildings();
      await loadHourlyChart(document.getElementById("buildingSelect").value);
      await loadAlerts();
    }

    async function init() {
      await loadAll();
    }

    document.getElementById("buildingSelect").addEventListener("change", function () {
      loadHourlyChart(this.value);
    });

    window.onload = init;
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
